<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600" role="img" aria-label="Illustration of a home with rooftop solar panels under a bright sun">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d9ecf7"/>
      <stop offset="1" stop-color="#fbf7ef"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#sky)"/>
  <circle cx="650" cy="130" r="70" fill="#f4a300"/>
  <g stroke="#f4a300" stroke-width="6" stroke-linecap="round" opacity="0.7">
    <line x1="650" y1="20" x2="650" y2="45"/>
    <line x1="540" y1="130" x2="565" y2="130"/>
    <line x1="572" y1="52" x2="590" y2="70"/>
  </g>
  <!-- ground -->
  <rect y="470" width="800" height="130" fill="#2d6a4f"/>
  <!-- house -->
  <g>
    <rect x="230" y="330" width="340" height="160" fill="#fdfdfb"/>
    <polygon points="200,330 400,210 600,330" fill="#9a4f3a"/>
    <!-- panels on roof -->
    <g transform="translate(330,250) rotate(-31)">
      <rect x="0" y="0" width="180" height="90" fill="#13315c" stroke="#0b2545" stroke-width="3"/>
      <g stroke="#1d4e89" stroke-width="2">
        <line x1="45" y1="0" x2="45" y2="90"/>
        <line x1="90" y1="0" x2="90" y2="90"/>
        <line x1="135" y1="0" x2="135" y2="90"/>
        <line x1="0" y1="45" x2="180" y2="45"/>
      </g>
    </g>
    <rect x="270" y="380" width="60" height="80" fill="#1d4e89"/>
    <rect x="430" y="380" width="70" height="60" fill="#9fc6e0"/>
  </g>
  <text x="400" y="560" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#fbf7ef" opacity="0.85">Placeholder illustration. Swap for a real central Illinois home photo.</text>
</svg>
