<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600" role="img" aria-label="Illustration of a central Illinois family home">
  <defs>
    <linearGradient id="sky2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#eaf3d9"/>
      <stop offset="1" stop-color="#fbf7ef"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#sky2)"/>
  <!-- fields / horizon, a nod to central Illinois farmland -->
  <rect y="430" width="800" height="170" fill="#6a994e"/>
  <rect y="500" width="800" height="100" fill="#386641"/>
  <!-- house -->
  <rect x="250" y="300" width="300" height="160" fill="#fdfdfb" stroke="#e2d9c4" stroke-width="2"/>
  <polygon points="220,300 400,190 580,300" fill="#3a5a78"/>
  <rect x="285" y="350" width="60" height="110" fill="#8a5a44"/>
  <rect x="420" y="340" width="80" height="70" fill="#9fc6e0" stroke="#fdfdfb" stroke-width="4"/>
  <!-- tree -->
  <rect x="120" y="350" width="18" height="110" fill="#6f4e37"/>
  <circle cx="129" cy="330" r="55" fill="#40916c"/>
  <text x="400" y="565" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#fbf7ef">Placeholder. Swap for a licensed central Illinois home photo.</text>
</svg>
