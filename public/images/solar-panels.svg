<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600" role="img" aria-label="Illustration of solar panels against a clear sky">
  <defs>
    <linearGradient id="sky3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#cfe6f4"/>
      <stop offset="1" stop-color="#eef6fb"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#sky3)"/>
  <circle cx="120" cy="110" r="55" fill="#f4a300"/>
  <rect y="430" width="800" height="170" fill="#6a994e"/>
  <!-- array of panels -->
  <g transform="translate(120,250) skewX(-12)">
    <g fill="#13315c" stroke="#0b2545" stroke-width="3">
      <rect x="0" y="0" width="160" height="100"/>
      <rect x="180" y="0" width="160" height="100"/>
      <rect x="360" y="0" width="160" height="100"/>
    </g>
    <g stroke="#3a6ea5" stroke-width="2">
      <line x1="40" y1="0" x2="40" y2="100"/><line x1="80" y1="0" x2="80" y2="100"/><line x1="120" y1="0" x2="120" y2="100"/>
      <line x1="220" y1="0" x2="220" y2="100"/><line x1="260" y1="0" x2="260" y2="100"/><line x1="300" y1="0" x2="300" y2="100"/>
      <line x1="400" y1="0" x2="400" y2="100"/><line x1="440" y1="0" x2="440" y2="100"/><line x1="480" y1="0" x2="480" y2="100"/>
      <line x1="0" y1="50" x2="520" y2="50"/>
    </g>
  </g>
  <!-- support posts -->
  <g stroke="#5a6b7b" stroke-width="8">
    <line x1="170" y1="360" x2="190" y2="430"/>
    <line x1="560" y1="360" x2="580" y2="430"/>
  </g>
  <text x="400" y="565" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#1b4332">Placeholder. Swap for a licensed solar panel photo.</text>
</svg>
